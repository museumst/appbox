<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>그리스 신화 계보</title>
    <link rel="stylesheet" href="../../assets/styles.css?v=20260517-greekmyth-v1" />
    <style>
      .greekmyth-app {
        display: block;
        align-items: start;
        min-width: 1180px;
        padding: 16px;
        background: #f5f3ef;
      }

      .greekmyth-panel {
        display: flex;
        width: 100%;
        max-width: none;
        height: calc(100vh - 32px);
        min-height: 680px;
        flex-direction: column;
      }

      .greekmyth-header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
      }

      .greekmyth-header h1 {
        margin: 0;
      }

      .greekmyth-guide {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 800;
        line-height: 1.6;
      }

      .greekmyth-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 18px;
      }

      .filter-button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        background: var(--surface);
        color: var(--muted);
        cursor: pointer;
        font-size: 0.88rem;
        font-weight: 800;
      }

      .filter-button:hover,
      .filter-button:focus-visible,
      .filter-button.is-active {
        border-color: #355c7d;
        background: #eaf1f6;
        color: #21384f;
        outline: none;
      }

      .greekmyth-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 16px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 800;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--group-color);
      }

      .greekmyth-scroll {
        flex: 1 1 auto;
        min-height: 0;
        margin-top: 20px;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        border: 1px solid var(--line);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(245, 243, 239, 0.9)),
          #fff;
      }

      .has-info-panel .greekmyth-scroll {
        padding-bottom: 320px;
        scroll-padding-bottom: 320px;
      }

      #greekmyth-svg {
        display: block;
        min-width: 100%;
      }

      .generation-label {
        fill: #69707a;
        font-size: 13px;
        font-weight: 900;
        font-family: system-ui, sans-serif;
      }

      .family-line {
        fill: none;
        stroke: #c8cdd2;
        stroke-width: 1.4;
      }

      .relation-line {
        fill: none;
        stroke: #be5872;
        stroke-width: 2;
        stroke-dasharray: 6 5;
        opacity: 0;
        transition: opacity 0.16s;
      }

      .relation-line.is-visible {
        opacity: 0.9;
      }

      .god-node {
        cursor: pointer;
      }

      .god-node rect {
        stroke: rgba(32, 33, 36, 0.18);
        stroke-width: 1;
        transition: fill 0.16s, opacity 0.16s, stroke 0.16s;
      }

      .god-node text {
        pointer-events: none;
        font-family: system-ui, sans-serif;
      }

      .god-node .god-name {
        fill: #fff;
        font-size: 14px;
        font-weight: 900;
      }

      .god-node .god-meta {
        fill: rgba(255, 255, 255, 0.82);
        font-size: 10px;
        font-weight: 800;
      }

      .god-node.is-dimmed {
        opacity: 0.24;
      }

      .god-node.is-selected rect {
        stroke: #111827;
        stroke-width: 3;
      }

      .family-line.is-dimmed {
        opacity: 0.16;
      }

      .family-line.is-highlighted {
        stroke: #111827;
        stroke-width: 2.8;
      }

      .bottom-panel {
        position: fixed;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 200;
        max-width: 620px;
        margin: 0 auto;
        border: 1px solid #d6d8dc;
        border-bottom: 0;
        border-radius: 16px 16px 0 0;
        background: var(--surface);
        box-shadow: 0 -10px 34px rgba(0, 0, 0, 0.14);
        transform: translateY(100%);
        transition: transform 0.24s ease;
      }

      .bottom-panel.open {
        transform: translateY(0);
      }

      .panel-handle {
        width: 36px;
        height: 4px;
        margin: 14px auto 0;
        border-radius: 2px;
        background: #c8cdd2;
      }

      .god-info {
        padding: 16px 20px 28px;
      }

      .god-info-header {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid #e4e7ea;
        padding-bottom: 14px;
      }

      .god-info h2 {
        margin: 0;
        color: var(--text);
        font-size: 1.35rem;
        line-height: 1.2;
      }

      .god-info .english-name {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.86rem;
        font-weight: 800;
      }

      .group-chip {
        flex: 0 0 auto;
        border-radius: 999px;
        padding: 6px 10px;
        background: var(--chip-color);
        color: #fff;
        font-size: 0.78rem;
        font-weight: 900;
      }

      .god-summary {
        margin: 14px 0 0;
        color: var(--text);
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1.62;
      }

      .god-detail-grid {
        display: grid;
        grid-template-columns: 84px minmax(0, 1fr);
        gap: 9px 12px;
        margin-top: 14px;
        color: var(--text);
        font-size: 0.9rem;
        line-height: 1.45;
      }

      .god-detail-grid dt {
        color: var(--muted);
        font-weight: 900;
      }

      .god-detail-grid dd {
        margin: 0;
        font-weight: 750;
      }

      .god-note {
        margin: 14px 0 0;
        border: 1px solid #ead3da;
        border-radius: 8px;
        padding: 10px 12px;
        background: #fff5f7;
        color: #7c2d41;
        font-size: 0.86rem;
        font-weight: 800;
        line-height: 1.5;
      }

      @media (max-width: 700px) {
        .greekmyth-app {
          padding: 16px;
        }

        .greekmyth-panel {
          padding: 24px;
        }

        .greekmyth-header {
          display: flex;
        }

        .filter-button {
          flex: 0 0 auto;
        }

        .god-detail-grid {
          grid-template-columns: 74px minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body class="mini-app greekmyth-app">
    <main class="mini-app-panel greekmyth-panel">
      <div class="greekmyth-header">
        <div>
          <p class="eyebrow">Mythology</p>
          <h1>그리스 신화 계보</h1>
        </div>
      </div>

      <p class="greekmyth-guide">신 이름을 누르면 부모, 자식, 배우자 관계와 설명을 볼 수 있습니다. 전승에 따라 달라지는 항목은 상세 패널에 따로 표시했습니다.</p>

      <div class="greekmyth-toolbar" id="filter-toolbar" aria-label="계보 필터"></div>
      <div class="greekmyth-legend" id="legend" aria-label="분류 범례"></div>

      <div class="greekmyth-scroll" role="img" aria-label="그리스 신화 계보도">
        <svg id="greekmyth-svg"></svg>
      </div>
    </main>

    <div class="bottom-panel" id="info-panel" role="dialog" aria-modal="true" aria-label="신 정보">
      <div class="panel-handle"></div>
      <div class="god-info">
        <div class="god-info-header">
          <div>
            <h2 id="info-name"></h2>
            <p class="english-name" id="info-english"></p>
          </div>
          <span class="group-chip" id="info-group"></span>
        </div>
        <p class="god-summary" id="info-summary"></p>
        <dl class="god-detail-grid" id="info-details"></dl>
        <p class="god-note" id="info-note" hidden></p>
      </div>
    </div>

    <script src="./gods.js"></script>
    <script>
      const { gods, groups, relationNotes } = window.GREEK_MYTH_GODS;

      const NS = "http://www.w3.org/2000/svg";
      const NODE_W = 118;
      const NODE_H = 58;
      const GAP_X = 24;
      const GAP_Y = 102;
      const PAD_X = 28;
      const PAD_TOP = 52;
      const PAD_BOTTOM = 32;
      const LEFT_LABEL_W = 88;

      const groupOrder = ["primordial", "titan", "olympian", "god", "hero", "mortal"];
      const generationLabels = {
        0: "기원",
        1: "원초",
        2: "세계",
        3: "티탄",
        4: "전환",
        5: "올림포스",
        6: "영웅",
      };

      const byId = new Map(gods.map((god) => [god.id, god]));
      const childrenById = new Map(gods.map((god) => [god.id, []]));
      gods.forEach((god) => {
        god.parents.forEach((parentId) => {
          if (childrenById.has(parentId)) {
            childrenById.get(parentId).push(god.id);
          }
        });
      });

      const toolbar = document.getElementById("filter-toolbar");
      const legend = document.getElementById("legend");
      const svg = document.getElementById("greekmyth-svg");
      const infoPanel = document.getElementById("info-panel");
      const infoName = document.getElementById("info-name");
      const infoEnglish = document.getElementById("info-english");
      const infoGroup = document.getElementById("info-group");
      const infoSummary = document.getElementById("info-summary");
      const infoDetails = document.getElementById("info-details");
      const infoNote = document.getElementById("info-note");

      let selectedGroup = "all";
      let selectedGodId = null;
      const nodeElements = new Map();
      const familyLines = [];
      const relationLines = [];

      function svgEl(tag, attrs = {}) {
        const el = document.createElementNS(NS, tag);
        Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
        return el;
      }

      function joinNames(ids) {
        const names = ids.map((id) => byId.get(id)?.name).filter(Boolean);
        return names.length ? names.join(", ") : "없음";
      }

      function getChildren(id) {
        return childrenById.get(id) || [];
      }

      function compactDomain(god) {
        return god.domain.slice(0, 2).join(" · ");
      }

      function makeFilterButton(id, label) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "filter-button";
        button.dataset.group = id;
        button.textContent = label;
        button.addEventListener("click", () => {
          selectedGroup = id;
          selectedGodId = null;
          closeInfoPanel();
          updateFilterButtons();
          updateHighlights();
        });
        toolbar.appendChild(button);
      }

      function updateFilterButtons() {
        toolbar.querySelectorAll(".filter-button").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.group === selectedGroup);
        });
      }

      function renderControls() {
        makeFilterButton("all", "전체");
        groupOrder.forEach((groupId) => makeFilterButton(groupId, groups[groupId].label));
        updateFilterButtons();

        groupOrder.forEach((groupId) => {
          const item = document.createElement("span");
          item.className = "legend-item";
          item.innerHTML = `<span class="legend-dot" style="--group-color:${groups[groupId].color}"></span>${groups[groupId].label}`;
          legend.appendChild(item);
        });
      }

      function layoutGods() {
        const generations = new Map();
        gods.forEach((god) => {
          if (!generations.has(god.generation)) generations.set(god.generation, []);
          generations.get(god.generation).push(god);
        });

        const maxCount = Math.max(...Array.from(generations.values(), (items) => items.length));
        const width = LEFT_LABEL_W + PAD_X * 2 + maxCount * NODE_W + (maxCount - 1) * GAP_X;
        const maxGeneration = Math.max(...Array.from(generations.keys()));
        const height = PAD_TOP + PAD_BOTTOM + (maxGeneration + 1) * NODE_H + maxGeneration * GAP_Y;

        Array.from(generations.entries()).forEach(([generation, items]) => {
          const rowWidth = items.length * NODE_W + (items.length - 1) * GAP_X;
          const startX = LEFT_LABEL_W + PAD_X + (width - LEFT_LABEL_W - PAD_X * 2 - rowWidth) / 2;
          const y = PAD_TOP + generation * (NODE_H + GAP_Y);

          items.forEach((god, index) => {
            god.x = startX + index * (NODE_W + GAP_X);
            god.y = y;
            god.cx = god.x + NODE_W / 2;
            god.cy = god.y + NODE_H / 2;
          });
        });

        return { width, height, maxGeneration };
      }

      function renderTree() {
        const { width, height, maxGeneration } = layoutGods();
        svg.setAttribute("width", width);
        svg.setAttribute("height", height);
        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

        const backgroundG = svgEl("g");
        const lineG = svgEl("g");
        const relationG = svgEl("g");
        const nodeG = svgEl("g");
        svg.append(backgroundG, lineG, relationG, nodeG);

        for (let generation = 0; generation <= maxGeneration; generation += 1) {
          const y = PAD_TOP + generation * (NODE_H + GAP_Y);
          const label = svgEl("text", {
            x: 20,
            y: y + NODE_H / 2,
            class: "generation-label",
            "dominant-baseline": "middle",
          });
          label.textContent = generationLabels[generation] || `${generation}세대`;
          backgroundG.appendChild(label);
        }

        gods.forEach((god) => {
          god.parents.forEach((parentId) => {
            const parent = byId.get(parentId);
            if (!parent) return;
            const y1 = parent.y + NODE_H;
            const y2 = god.y;
            const midY = y1 + (y2 - y1) * 0.55;
            const path = svgEl("path", {
              class: "family-line",
              d: `M${parent.cx},${y1} V${midY} H${god.cx} V${y2}`,
              "data-parent": parent.id,
              "data-child": god.id,
            });
            familyLines.push(path);
            lineG.appendChild(path);
          });
        });

        gods.forEach((god) => {
          god.partners.forEach((partnerId) => {
            if (god.id > partnerId) return;
            const partner = byId.get(partnerId);
            if (!partner) return;
            const yOffset = god.y === partner.y ? 0 : 18;
            const path = svgEl("path", {
              class: "relation-line",
              d: `M${god.cx},${god.cy + yOffset} C${god.cx},${god.cy + 58} ${partner.cx},${partner.cy + 58} ${partner.cx},${partner.cy + yOffset}`,
              "data-a": god.id,
              "data-b": partner.id,
            });
            relationLines.push(path);
            relationG.appendChild(path);
          });
        });

        gods.forEach((god) => {
          const group = groups[god.group];
          const node = svgEl("g", {
            class: "god-node",
            tabindex: "0",
            role: "button",
            "aria-label": god.name,
            "data-id": god.id,
          });

          node.appendChild(svgEl("rect", {
            x: god.x,
            y: god.y,
            width: NODE_W,
            height: NODE_H,
            rx: 8,
            fill: group.color,
          }));

          const name = svgEl("text", {
            x: god.cx,
            y: god.y + 23,
            class: "god-name",
            "text-anchor": "middle",
            "dominant-baseline": "middle",
          });
          name.textContent = god.name;
          node.appendChild(name);

          const meta = svgEl("text", {
            x: god.cx,
            y: god.y + 42,
            class: "god-meta",
            "text-anchor": "middle",
            "dominant-baseline": "middle",
          });
          meta.textContent = compactDomain(god);
          node.appendChild(meta);

          node.addEventListener("click", () => selectGod(god.id));
          node.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              selectGod(god.id);
            }
          });

          nodeElements.set(god.id, node);
          nodeG.appendChild(node);
        });
      }

      function selectGod(id) {
        selectedGodId = id;
        selectedGroup = "all";
        updateFilterButtons();
        updateHighlights();
        openInfo(byId.get(id));
      }

      function updateHighlights() {
        const selected = selectedGodId ? byId.get(selectedGodId) : null;
        const related = new Set();
        if (selected) {
          related.add(selected.id);
          selected.parents.forEach((id) => related.add(id));
          selected.partners.forEach((id) => related.add(id));
          getChildren(selected.id).forEach((id) => related.add(id));
        }

        nodeElements.forEach((node, id) => {
          const god = byId.get(id);
          const filteredOut = selectedGroup !== "all" && god.group !== selectedGroup;
          const unrelated = selected && !related.has(id);
          node.classList.toggle("is-dimmed", filteredOut || unrelated);
          node.classList.toggle("is-selected", selectedGodId === id);
        });

        familyLines.forEach((line) => {
          const parentId = line.dataset.parent;
          const childId = line.dataset.child;
          const highlighted = selected && (selected.id === parentId || selected.id === childId);
          line.classList.toggle("is-highlighted", highlighted);
          line.classList.toggle("is-dimmed", Boolean(selected) && !highlighted);
        });

        relationLines.forEach((line) => {
          const visible = selected && (line.dataset.a === selected.id || line.dataset.b === selected.id);
          line.classList.toggle("is-visible", visible);
        });
      }

      function findNotes(god) {
        return relationNotes.filter((note) => note.relatedIds.includes(god.id));
      }

      function closeInfoPanel() {
        infoPanel.classList.remove("open");
        document.body.classList.remove("has-info-panel");
      }

      function openInfo(god) {
        const group = groups[god.group];
        const children = getChildren(god.id);
        const notes = findNotes(god);

        infoName.textContent = god.name;
        infoEnglish.textContent = `${god.englishName} · ${god.greekName}`;
        infoGroup.textContent = group.label;
        infoGroup.style.setProperty("--chip-color", group.color);
        infoSummary.textContent = god.summary;
        infoDetails.innerHTML = `
          <dt>영역</dt><dd>${god.domain.join(", ")}</dd>
          <dt>부모</dt><dd>${joinNames(god.parents)}</dd>
          <dt>자식</dt><dd>${joinNames(children)}</dd>
          <dt>관계</dt><dd>${joinNames(god.partners)}</dd>
        `;

        const noteText = [god.note, ...notes.map((note) => `${note.title}: ${note.text}`)]
          .filter(Boolean)
          .join(" ");
        infoNote.hidden = !noteText;
        infoNote.textContent = noteText;
        document.body.classList.add("has-info-panel");
        infoPanel.classList.add("open");
      }

      document.addEventListener("click", (event) => {
        const clickedNode = event.target.closest?.(".god-node");
        const clickedPanel = event.target.closest?.("#info-panel");
        const clickedFilter = event.target.closest?.(".filter-button");
        if (!clickedNode && !clickedPanel && !clickedFilter) {
          selectedGodId = null;
          closeInfoPanel();
          updateHighlights();
        }
      });

      renderControls();
      renderTree();
      updateHighlights();
      requestAnimationFrame(() => {
        const scroller = document.querySelector(".greekmyth-scroll");
        scroller.scrollLeft = Math.max(0, (scroller.scrollWidth - scroller.clientWidth) / 2);
      });
    </script>
  </body>
</html>
