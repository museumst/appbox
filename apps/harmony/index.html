<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Harmony</title>
    <link rel="stylesheet" href="../../assets/styles.css?v=20260518-harmony" />
    <style>
      body.harmony-app {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.74), rgba(239, 246, 244, 0.96)),
          var(--bg);
      }

      .harmony-panel {
        width: min(860px, 100%);
      }

      .harmony-header {
        display: flex;
        gap: 16px;
        align-items: end;
        justify-content: space-between;
      }

      .harmony-status {
        min-width: 7.5rem;
        margin: 0 0 6px;
        color: var(--accent-strong);
        font-size: 1rem;
        font-weight: 900;
        text-align: right;
      }

      .root-control {
        display: grid;
        gap: 8px;
        width: min(240px, 100%);
        color: var(--muted);
        font-size: 0.86rem;
        font-weight: 900;
      }

      .harmony-controls {
        display: flex;
        gap: 12px;
        align-items: end;
        margin: 24px 0 0;
      }

      .root-control select {
        min-height: 48px;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        background: var(--surface);
        color: var(--text);
        font: inherit;
        font-size: 1.05rem;
        font-weight: 900;
      }

      .transport-actions {
        display: flex;
        gap: 8px;
      }

      .transport-button,
      .slot-delete {
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
      }

      .transport-button {
        width: 48px;
        height: 48px;
      }

      .transport-button:hover,
      .transport-button:focus-visible,
      .transport-button.is-active,
      .slot-delete:hover,
      .slot-delete:focus-visible {
        border-color: var(--accent);
        color: var(--accent-strong);
        outline: none;
      }

      .transport-button:disabled {
        cursor: default;
        opacity: 0.4;
      }

      .transport-button svg,
      .slot-delete svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      .sequence-slots {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin: 16px 0 0;
      }

      .sequence-slot {
        position: relative;
        display: grid;
        min-height: 64px;
        align-content: center;
        gap: 4px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 38px 10px 10px;
        background: var(--surface-strong);
      }

      .sequence-slot.is-empty {
        color: #a3aaad;
        background: var(--surface);
      }

      .sequence-slot.is-playing {
        border-color: var(--accent);
        background: #dff3ef;
      }

      .slot-index,
      .slot-notes {
        margin: 0;
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 900;
        line-height: 1.2;
      }

      .slot-chord {
        margin: 0;
        color: var(--text);
        font-size: 0.96rem;
        font-weight: 900;
        line-height: 1.2;
      }

      .slot-delete {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 28px;
        height: 28px;
      }

      .slot-delete[hidden] {
        display: none;
      }

      .chord-sections {
        display: grid;
        gap: 18px;
        margin: 26px 0 0;
      }

      .chord-section {
        display: grid;
        gap: 8px;
      }

      .chord-section-title {
        margin: 0;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .chord-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .chord-button {
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-strong);
        color: var(--text);
        cursor: pointer;
        font-size: 1.15rem;
        font-weight: 900;
        touch-action: manipulation;
        user-select: none;
        transition:
          background 0.12s ease,
          border-color 0.12s ease,
          color 0.12s ease,
          transform 0.12s ease;
      }

      .chord-button:hover,
      .chord-button:focus-visible,
      .chord-button.is-active,
      .chord-button.is-playing {
        border-color: var(--accent);
        background: #dff3ef;
        color: var(--accent-strong);
        outline: none;
      }

      .chord-button:active {
        transform: translateY(1px);
      }

      .keyboard-wrap {
        max-width: 100%;
        margin: 32px 0 0;
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .keyboard {
        position: relative;
        display: grid;
        grid-template-columns: repeat(16, minmax(48px, 1fr));
        height: clamp(230px, 36vw, 340px);
        min-width: 760px;
        border: 1px solid #111827;
        border-radius: 8px;
        overflow: hidden;
        background: #111827;
      }

      .key {
        position: relative;
        border: 0;
        border-right: 1px solid #cbd5d1;
        cursor: pointer;
        font: inherit;
        touch-action: none;
        user-select: none;
      }

      .key.white {
        z-index: 1;
        display: flex;
        align-items: end;
        justify-content: center;
        padding: 0 4px 14px;
        background: #fffefa;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
      }

      .key.white:last-child {
        border-right: 0;
      }

      .key.black {
        position: absolute;
        z-index: 3;
        top: 0;
        width: 5%;
        height: 62%;
        border: 1px solid #101418;
        border-top: 0;
        border-radius: 0 0 6px 6px;
        background: linear-gradient(180deg, #171b21, #050608);
        color: #cbd5d1;
        transform: translateX(-50%);
      }

      .key.black span {
        position: absolute;
        right: 0;
        bottom: 12px;
        left: 0;
        font-size: 0.72rem;
        font-weight: 800;
      }

      .key.is-pressed.white {
        background: #b7ebe0;
        color: #073f3b;
        box-shadow: inset 0 10px 0 rgba(15, 118, 110, 0.22);
      }

      .key.is-pressed.black {
        background: linear-gradient(180deg, #0f766e, #084d48);
        color: #ecfdf5;
        box-shadow: inset 0 -8px 0 rgba(255, 255, 255, 0.12);
      }

      .key:focus-visible {
        outline: 3px solid var(--yellow);
        outline-offset: -3px;
      }

      .harmony-notes {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-height: 38px;
        margin: 20px 0 0;
      }

      .note-chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 7px 10px;
        background: var(--surface-strong);
        color: var(--text);
        font-size: 0.86rem;
        font-weight: 900;
      }

      @media (max-width: 700px) {
        .harmony-app {
          padding: 14px;
        }

        .harmony-panel {
          padding: 18px;
        }

        .harmony-header {
          display: grid;
          align-items: start;
        }

        .harmony-status {
          text-align: left;
        }

        .root-control {
          width: 100%;
        }

        .harmony-controls {
          display: grid;
        }

        .transport-actions {
          width: 100%;
        }

        .transport-button {
          width: 100%;
        }

        .sequence-slots {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .chord-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .key.black {
          width: 5.8%;
        }
      }
    </style>
  </head>
  <body class="mini-app harmony-app">
    <main class="mini-app-panel harmony-panel">
      <div class="harmony-header">
        <div>
          <p class="eyebrow">Music</p>
          <h1>Harmony</h1>
        </div>
        <p class="harmony-status" id="status">C Major</p>
      </div>

      <div class="harmony-controls">
        <label class="root-control">
          <span>Root</span>
          <select id="root-select" aria-label="뿌리음 선택"></select>
        </label>
        <div class="transport-actions" aria-label="저장 코드 재생 컨트롤">
          <button class="transport-button" type="button" id="record-button" aria-label="선택한 코드 저장">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="7"></circle>
            </svg>
          </button>
          <button class="transport-button" type="button" id="play-button" aria-label="저장한 코드 재생" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 5v14l11-7z"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="sequence-slots" id="sequence-slots" aria-label="저장된 코드 슬롯"></div>
      <div class="chord-sections" id="chord-grid" aria-label="코드 선택"></div>
      <div class="keyboard-wrap">
        <div class="keyboard" id="keyboard" aria-label="건반"></div>
      </div>
      <div class="harmony-notes" id="notes" aria-live="polite"></div>
    </main>

    <script>
      const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
      const whitePitchClasses = new Set([0, 2, 4, 5, 7, 9, 11]);
      const rootOptions = [
        { name: "C", label: "C", pitch: 0 },
        { name: "C#", label: "C#/Db", pitch: 1 },
        { name: "D", label: "D", pitch: 2 },
        { name: "D#", label: "D#/Eb", pitch: 3 },
        { name: "E", label: "E", pitch: 4 },
        { name: "F", label: "F", pitch: 5 },
        { name: "F#", label: "F#/Gb", pitch: 6 },
        { name: "G", label: "G", pitch: 7 },
        { name: "G#", label: "G#/Ab", pitch: 8 },
        { name: "A", label: "A", pitch: 9 },
        { name: "A#", label: "A#/Bb", pitch: 10 },
        { name: "B", label: "B", pitch: 11 },
      ];
      const chordGroups = [
        {
          title: "Basic",
          types: [
            { id: "major", label: "Major", intervals: [0, 4, 7] },
            { id: "minor", label: "Minor", intervals: [0, 3, 7] },
            { id: "dim", label: "Dim", intervals: [0, 3, 6] },
            { id: "aug", label: "Aug", intervals: [0, 4, 8] },
          ],
        },
        {
          title: "Seventh",
          types: [
            { id: "7", label: "7", intervals: [0, 4, 7, 10] },
            { id: "major-7", label: "Major 7", intervals: [0, 4, 7, 11] },
            { id: "minor-7", label: "Minor 7", intervals: [0, 3, 7, 10] },
          ],
        },
        {
          title: "Color",
          types: [
            { id: "sus4", label: "Sus4", intervals: [0, 5, 7] },
            { id: "add9", label: "Add9", intervals: [0, 4, 7, 14] },
            { id: "6", label: "6", intervals: [0, 4, 7, 9] },
            { id: "9", label: "9", intervals: [0, 4, 7, 10, 14] },
          ],
        },
      ];
      const chordTypes = chordGroups.flatMap((group) => group.types);
      const keys = buildKeyboard(60, 86);

      const rootSelect = document.querySelector("#root-select");
      const chordGrid = document.querySelector("#chord-grid");
      const keyboard = document.querySelector("#keyboard");
      const notesOutput = document.querySelector("#notes");
      const playButton = document.querySelector("#play-button");
      const recordButton = document.querySelector("#record-button");
      const sequenceSlotsElement = document.querySelector("#sequence-slots");
      const statusOutput = document.querySelector("#status");
      let audioContext;
      let masterInput;
      let selectedRoot = rootOptions[0];
      let selectedChordType = chordTypes[0];
      let selectedChord = buildChord(selectedRoot, selectedChordType);
      let isSequencePlaying = false;
      let sequenceIndex = 0;
      let sequenceTimer;
      const activeSources = new Map();
      const activeVoices = new Map();
      const releaseTimers = new Map();
      const sequenceSlots = Array(8).fill(null);
      const beatMs = 720;
      const beatHoldMs = 560;

      function buildKeyboard(startMidi, endMidi) {
        const whiteCount = Array.from({ length: endMidi - startMidi + 1 }, (_, index) => startMidi + index)
          .filter((midi) => whitePitchClasses.has(midi % 12)).length;
        let whiteBefore = 0;

        return Array.from({ length: endMidi - startMidi + 1 }, (_, index) => {
          const midi = startMidi + index;
          const note = midiToNote(midi);
          const pitchClass = midi % 12;
          const isWhite = whitePitchClasses.has(pitchClass);
          const key = {
            note,
            type: isWhite ? "white" : "black",
            label: note.replace(/\d+$/, ""),
            left: isWhite ? null : (whiteBefore / whiteCount) * 100,
          };

          if (isWhite) {
            whiteBefore += 1;
          }

          return key;
        });
      }

      function midiToNote(midi) {
        const octave = Math.floor(midi / 12) - 1;
        return `${noteNames[midi % 12]}${octave}`;
      }

      function noteToMidi(note) {
        const match = note.match(/^([A-G])(#?)(\d+)$/);
        if (!match) return null;
        const [, name, sharp, octave] = match;
        const pitch = noteNames.indexOf(`${name}${sharp}`);
        if (pitch < 0) return null;
        return (Number(octave) + 1) * 12 + pitch;
      }

      function noteFrequency(note) {
        const midi = noteToMidi(note);
        if (midi === null) return null;
        return 440 * 2 ** ((midi - 69) / 12);
      }

      function buildChord(root, type) {
        const rootMidi = 60 + root.pitch;
        const notes = type.intervals.map((interval) => midiToNote(rootMidi + interval));
        return {
          id: `${root.name}-${type.id}`,
          name: `${root.name} ${type.label}`,
          notes,
          type,
        };
      }

      function cloneChord(chord) {
        return {
          id: chord.id,
          name: chord.name,
          notes: [...chord.notes],
        };
      }

      function getAudioContext() {
        if (!audioContext) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return null;
          audioContext = new AudioContextClass();

          const compressor = audioContext.createDynamicsCompressor();
          compressor.threshold.setValueAtTime(-24, audioContext.currentTime);
          compressor.knee.setValueAtTime(24, audioContext.currentTime);
          compressor.ratio.setValueAtTime(8, audioContext.currentTime);
          compressor.attack.setValueAtTime(0.006, audioContext.currentTime);
          compressor.release.setValueAtTime(0.18, audioContext.currentTime);

          const delay = audioContext.createDelay();
          const feedback = audioContext.createGain();
          const wet = audioContext.createGain();
          masterInput = audioContext.createGain();

          delay.delayTime.setValueAtTime(0.14, audioContext.currentTime);
          feedback.gain.setValueAtTime(0.18, audioContext.currentTime);
          wet.gain.setValueAtTime(0.12, audioContext.currentTime);
          masterInput.gain.setValueAtTime(0.68, audioContext.currentTime);

          masterInput.connect(compressor);
          masterInput.connect(delay);
          delay.connect(feedback);
          feedback.connect(delay);
          delay.connect(wet);
          wet.connect(compressor);
          compressor.connect(audioContext.destination);
        }
        return audioContext;
      }

      function startNote(note) {
        if (activeVoices.has(note)) return;
        const context = getAudioContext();
        const frequency = noteFrequency(note);
        if (!context || !frequency) return;

        const now = context.currentTime;
        const filter = context.createBiquadFilter();
        const envelope = context.createGain();
        const bodyGain = context.createGain();
        const warmGain = context.createGain();
        const edgeGain = context.createGain();
        const body = context.createOscillator();
        const warm = context.createOscillator();
        const edge = context.createOscillator();

        filter.type = "lowpass";
        filter.Q.setValueAtTime(0.9, now);
        filter.frequency.setValueAtTime(Math.min(4200, frequency * 8), now);
        filter.frequency.exponentialRampToValueAtTime(Math.min(2600, frequency * 4.2), now + 0.32);

        envelope.gain.setValueAtTime(0.0001, now);
        envelope.gain.exponentialRampToValueAtTime(0.18, now + 0.028);
        envelope.gain.exponentialRampToValueAtTime(0.115, now + 0.42);

        body.type = "triangle";
        body.frequency.setValueAtTime(frequency, now);
        body.detune.setValueAtTime(-4, now);
        bodyGain.gain.setValueAtTime(0.72, now);

        warm.type = "sine";
        warm.frequency.setValueAtTime(frequency, now);
        warm.detune.setValueAtTime(5, now);
        warmGain.gain.setValueAtTime(0.52, now);

        edge.type = "sawtooth";
        edge.frequency.setValueAtTime(frequency * 2, now);
        edge.detune.setValueAtTime(2, now);
        edgeGain.gain.setValueAtTime(0.045, now);

        body.connect(bodyGain);
        warm.connect(warmGain);
        edge.connect(edgeGain);
        bodyGain.connect(envelope);
        warmGain.connect(envelope);
        edgeGain.connect(envelope);
        envelope.connect(filter);
        filter.connect(masterInput);

        body.start(now);
        warm.start(now);
        edge.start(now);
        activeVoices.set(note, { oscillators: [body, warm, edge], envelope, filter });
      }

      function stopNote(note) {
        const voice = activeVoices.get(note);
        if (!voice || !audioContext) return;

        const now = audioContext.currentTime;
        voice.envelope.gain.cancelScheduledValues(now);
        voice.envelope.gain.setTargetAtTime(0.0001, now, 0.22);
        voice.filter.frequency.cancelScheduledValues(now);
        voice.filter.frequency.setTargetAtTime(620, now, 0.2);
        voice.oscillators.forEach((oscillator) => oscillator.stop(now + 0.95));
        activeVoices.delete(note);
      }

      function updatePressedKeys(notes) {
        document.querySelectorAll(".key").forEach((key) => {
          key.classList.toggle("is-pressed", notes.includes(key.dataset.note));
        });
        document.querySelectorAll(".chord-button").forEach((button) => {
          const isPlaying = [...activeSources.values()].some(
            (source) => source.chordName === button.dataset.chord
          );
          button.classList.toggle("is-playing", isPlaying);
        });
        renderSequenceSlots();
      }

      async function resumeAudio() {
        const context = getAudioContext();
        if (!context) return false;
        if (context.state === "suspended") {
          await context.resume();
        }
        return true;
      }

      function getHeldNotes() {
        return [...new Set([...activeSources.values()].flatMap((source) => source.notes))];
      }

      function syncHeldNotes() {
        const heldNotes = getHeldNotes();
        heldNotes.forEach(startNote);
        [...activeVoices.keys()].forEach((note) => {
          if (!heldNotes.includes(note)) stopNote(note);
        });
        updatePressedKeys(heldNotes);
      }

      async function holdNotes(sourceId, notes, chordName = "") {
        clearTimeout(releaseTimers.get(sourceId));
        releaseTimers.delete(sourceId);
        activeSources.set(sourceId, { notes, chordName, startedAt: Date.now() });
        syncHeldNotes();
        await resumeAudio();
        syncHeldNotes();
      }

      function releaseNotes(sourceId, force = false) {
        const source = activeSources.get(sourceId);
        if (!source) return;

        const heldFor = Date.now() - source.startedAt;
        if (!force && heldFor < 120) {
          clearTimeout(releaseTimers.get(sourceId));
          releaseTimers.set(
            sourceId,
            setTimeout(() => {
              activeSources.delete(sourceId);
              releaseTimers.delete(sourceId);
              syncHeldNotes();
            }, 120 - heldFor)
          );
          return;
        }

        activeSources.delete(sourceId);
        syncHeldNotes();
      }

      function selectChord(chord) {
        selectedChord = chord;
        renderChords();
        renderNotes();
        updatePressedKeys(getHeldNotes());
      }

      function getFilledSlots() {
        return sequenceSlots
          .map((chord, index) => ({ chord, index }))
          .filter((slot) => slot.chord);
      }

      function renderSequenceSlots() {
        const playingSource = activeSources.get("sequence");

        sequenceSlotsElement.innerHTML = sequenceSlots
          .map((chord, index) => {
            const isPlaying = playingSource?.slotIndex === index;
            const notes = chord?.notes.map((note) => note.replace(/\d+$/, "")).join(" ");

            return `
              <div class="sequence-slot ${chord ? "" : "is-empty"} ${isPlaying ? "is-playing" : ""}">
                <p class="slot-index">${index + 1}</p>
                <p class="slot-chord">${chord?.name || "-"}</p>
                <p class="slot-notes">${notes || ""}</p>
                <button
                  class="slot-delete"
                  type="button"
                  data-slot="${index}"
                  aria-label="${index + 1}번 슬롯 삭제"
                  ${chord ? "" : "hidden"}
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M15.7 3.7a2 2 0 0 1 2.8 0l1.8 1.8a2 2 0 0 1 0 2.8L10.6 18H5.2l-1.6-1.6a2 2 0 0 1 0-2.8L15.7 3.7Zm-8.9 9.5 4 4 8.1-8.1-4-4-8.1 8.1ZM4 20h16v2H4v-2Z"></path>
                  </svg>
                </button>
              </div>
            `;
          })
          .join("");

        playButton.disabled = getFilledSlots().length === 0;
        playButton.classList.toggle("is-active", isSequencePlaying);
        playButton.setAttribute("aria-label", isSequencePlaying ? "재생 정지" : "저장한 코드 재생");
        recordButton.disabled = sequenceSlots.every(Boolean);
        recordButton.setAttribute(
          "aria-label",
          recordButton.disabled ? "슬롯이 모두 찼습니다" : "선택한 코드 저장"
        );
        playButton.innerHTML = isSequencePlaying
          ? `
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 5h4v14H7V5Zm6 0h4v14h-4V5Z"></path>
            </svg>
          `
          : `
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 5v14l11-7z"></path>
            </svg>
          `;
      }

      function recordSelectedChord() {
        const emptyIndex = sequenceSlots.findIndex((slot) => !slot);
        if (emptyIndex === -1) return;

        sequenceSlots[emptyIndex] = cloneChord(selectedChord);
        renderSequenceSlots();
      }

      function deleteSlot(index) {
        if (activeSources.get("sequence")?.slotIndex === index) {
          releaseNotes("sequence", true);
        }
        sequenceSlots[index] = null;
        const filledCount = getFilledSlots().length;
        if (filledCount === 0) {
          stopSequence();
        } else {
          sequenceIndex %= filledCount;
        }
        renderSequenceSlots();
      }

      function stopSequence() {
        isSequencePlaying = false;
        clearTimeout(sequenceTimer);
        releaseNotes("sequence", true);
        renderSequenceSlots();
      }

      async function playSequenceStep() {
        if (!isSequencePlaying) return;

        const filledSlots = getFilledSlots();
        if (filledSlots.length === 0) {
          stopSequence();
          return;
        }

        const { chord, index } = filledSlots[sequenceIndex % filledSlots.length];
        sequenceIndex = (sequenceIndex + 1) % filledSlots.length;
        activeSources.delete("sequence");
        activeSources.set("sequence", {
          notes: chord.notes,
          chordName: chord.name,
          startedAt: Date.now(),
          slotIndex: index,
        });
        await resumeAudio();
        if (!isSequencePlaying) return;
        syncHeldNotes();

        clearTimeout(releaseTimers.get("sequence"));
        releaseTimers.set(
          "sequence",
          setTimeout(() => {
            releaseNotes("sequence");
          }, beatHoldMs)
        );

        sequenceTimer = setTimeout(playSequenceStep, beatMs);
      }

      function startSequence() {
        const filledSlots = getFilledSlots();
        if (filledSlots.length === 0) return;

        isSequencePlaying = true;
        sequenceIndex = 0;
        renderSequenceSlots();
        playSequenceStep();
      }

      function renderChords() {
        chordGrid.innerHTML = chordGroups
          .map((group) => {
            const buttons = group.types
              .map((type) => {
                const chord = buildChord(selectedRoot, type);
                const isActive = type.id === selectedChordType.id;
                return `
                  <button
                    class="chord-button ${isActive ? "is-active" : ""}"
                    type="button"
                    data-chord-type="${type.id}"
                    data-chord="${chord.name}"
                    aria-pressed="${isActive ? "true" : "false"}"
                  >
                    ${chord.name}
                  </button>
                `;
              })
              .join("");

            return `
              <section class="chord-section" aria-label="${group.title}">
                <p class="chord-section-title">${group.title}</p>
                <div class="chord-grid">${buttons}</div>
              </section>
            `;
          })
          .join("");
      }

      function renderRootOptions() {
        rootSelect.innerHTML = rootOptions
          .map(
            (root) => `
              <option value="${root.pitch}" ${root.pitch === selectedRoot.pitch ? "selected" : ""}>
                ${root.label}
              </option>
            `
          )
          .join("");
      }

      function renderKeyboard() {
        const whiteKeys = keys.filter((key) => key.type === "white");
        const blackKeys = keys.filter((key) => key.type === "black");
        keyboard.innerHTML = [
          ...whiteKeys.map(
            (key) => `
              <button class="key white" type="button" data-note="${key.note}" aria-label="${key.note}">
                <span>${key.label}</span>
              </button>
            `
          ),
          ...blackKeys.map((key) => {
            return `
              <button
                class="key black"
                style="left: ${key.left}%"
                type="button"
                data-note="${key.note}"
                aria-label="${key.note}"
              >
                <span>${key.label}</span>
              </button>
            `;
          }),
        ].join("");
      }

      function renderNotes() {
        statusOutput.textContent = selectedChord.name;
        notesOutput.innerHTML = selectedChord.notes
          .map((note) => `<span class="note-chip" title="${note}">${note.replace(/\d+$/, "")}</span>`)
          .join("");
      }

      chordGrid.addEventListener("pointerdown", (event) => {
        const button = event.target.closest(".chord-button");
        if (!button || event.button > 0) return;
        event.preventDefault();
        const type = chordTypes.find((item) => item.id === button.dataset.chordType);
        if (!type) return;
        selectedChordType = type;
        const chord = buildChord(selectedRoot, type);
        selectChord(chord);
        holdNotes(`pointer-${event.pointerId}`, chord.notes, chord.name);
      });

      keyboard.addEventListener("pointerdown", (event) => {
        const key = event.target.closest(".key");
        if (!key || event.button > 0) return;
        event.preventDefault();
        holdNotes(`pointer-${event.pointerId}`, [key.dataset.note]);
      });

      document.addEventListener("pointerup", (event) => {
        releaseNotes(`pointer-${event.pointerId}`);
      });

      document.addEventListener("pointercancel", (event) => {
        releaseNotes(`pointer-${event.pointerId}`);
      });

      chordGrid.addEventListener("keydown", (event) => {
        if (event.repeat || ![" ", "Enter"].includes(event.key)) return;
        const button = event.target.closest(".chord-button");
        if (!button) return;
        event.preventDefault();
        const type = chordTypes.find((item) => item.id === button.dataset.chordType);
        if (!type) return;
        selectedChordType = type;
        const chord = buildChord(selectedRoot, type);
        selectChord(chord);
        holdNotes(`key-${chord.name}`, chord.notes, chord.name);
      });

      chordGrid.addEventListener("keyup", (event) => {
        if (![" ", "Enter"].includes(event.key)) return;
        const button = event.target.closest(".chord-button");
        if (!button) return;
        event.preventDefault();
        releaseNotes(`key-${button.dataset.chord}`);
      });

      keyboard.addEventListener("keydown", (event) => {
        if (event.repeat || ![" ", "Enter"].includes(event.key)) return;
        const key = event.target.closest(".key");
        if (!key) return;
        event.preventDefault();
        holdNotes(`key-${key.dataset.note}`, [key.dataset.note]);
      });

      keyboard.addEventListener("keyup", (event) => {
        if (![" ", "Enter"].includes(event.key)) return;
        const key = event.target.closest(".key");
        if (!key) return;
        event.preventDefault();
        releaseNotes(`key-${key.dataset.note}`);
      });

      rootSelect.addEventListener("change", () => {
        const nextRoot = rootOptions.find((root) => root.pitch === Number(rootSelect.value));
        if (!nextRoot) return;
        selectedRoot = nextRoot;
        selectedChord = buildChord(selectedRoot, selectedChordType);
        renderChords();
        renderNotes();
        updatePressedKeys(getHeldNotes());
      });

      recordButton.addEventListener("click", recordSelectedChord);

      playButton.addEventListener("click", () => {
        if (isSequencePlaying) {
          stopSequence();
          return;
        }
        startSequence();
      });

      sequenceSlotsElement.addEventListener("click", (event) => {
        const button = event.target.closest(".slot-delete");
        if (!button) return;
        deleteSlot(Number(button.dataset.slot));
      });

      renderRootOptions();
      renderChords();
      renderKeyboard();
      renderNotes();
      renderSequenceSlots();
    </script>
  </body>
</html>
