<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>조선왕조 가계도</title>
    <link rel="stylesheet" href="../../assets/styles.css?v=20260517-joseon-kings-only-tree" />
  </head>
  <body class="mini-app joseon-app">
    <main class="mini-app-panel joseon-panel">
      <p class="eyebrow">History</p>
      <h1>조선왕조 가계도</h1>

      <p class="joseon-mnemonic">태정태세문단세 예성연중인명선 광인효현숙경영 정순헌철고순</p>
      <p class="joseon-guide">왕만 표시했습니다. 왕이 아닌 중간 인물은 생략했으므로 일부 선은 직접 부자 관계가 아니라 왕실 계통 연결입니다.</p>

      <section class="joseon-tree" aria-label="조선 왕조 왕 중심 가계도">
        <div id="joseon-tree"></div>
      </section>
    </main>

    <script>
      const kings = [
        {
          order: 1,
          name: "태조",
          children: [
            { order: 2, name: "정종" },
            {
              order: 3,
              name: "태종",
              children: [
                {
                  order: 4,
                  name: "세종",
                  children: [
                    {
                      order: 5,
                      name: "문종",
                      children: [{ order: 6, name: "단종" }],
                    },
                    {
                      order: 7,
                      name: "세조",
                      children: [
                        { order: 8, name: "예종" },
                        {
                          order: 9,
                          name: "성종",
                          children: [
                            { order: 10, name: "연산군" },
                            {
                              order: 11,
                              name: "중종",
                              children: [
                                { order: 12, name: "인종" },
                                { order: 13, name: "명종" },
                                {
                                  order: 14,
                                  name: "선조",
                                  children: [
                                    { order: 15, name: "광해군" },
                                    {
                                      order: 16,
                                      name: "인조",
                                      children: [
                                        {
                                          order: 17,
                                          name: "효종",
                                          children: [
                                            {
                                              order: 18,
                                              name: "현종",
                                              children: [
                                                {
                                                  order: 19,
                                                  name: "숙종",
                                                  children: [
                                                    { order: 20, name: "경종" },
                                                    {
                                                      order: 21,
                                                      name: "영조",
                                                      children: [
                                                        {
                                                          order: 22,
                                                          name: "정조",
                                                          children: [
                                                            {
                                                              order: 23,
                                                              name: "순조",
                                                              children: [{ order: 24, name: "헌종" }],
                                                            },
                                                          ],
                                                        },
                                                        { order: 25, name: "철종" },
                                                      ],
                                                    },
                                                  ],
                                                },
                                              ],
                                            },
                                          ],
                                        },
                                        {
                                          order: 26,
                                          name: "고종",
                                          children: [{ order: 27, name: "순종" }],
                                        },
                                      ],
                                    },
                                  ],
                                },
                              ],
                            },
                          ],
                        },
                      ],
                    },
                  ],
                },
              ],
            },
          ],
        },
      ];

      const tree = document.querySelector("#joseon-tree");

      function renderKing(king) {
        const children = king.children || [];

        return `
          <li class="family-node ${children.length > 0 ? "has-children" : ""}">
            <article class="king-card is-king">
              <span class="king-order">${king.order}</span>
              <h3>${king.name}</h3>
            </article>
            ${
              children.length
                ? `<ol class="family-children">${children.map((child) => renderKing(child)).join("")}</ol>`
                : ""
            }
          </li>
        `;
      }

      tree.innerHTML = `<ol class="family-tree">${kings.map((king) => renderKing(king)).join("")}</ol>`;
    </script>
  </body>
</html>
