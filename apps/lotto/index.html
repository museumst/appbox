<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>로또번호 생성기</title>
    <link rel="stylesheet" href="../../assets/styles.css?v=20260516-lotto-grid" />
  </head>
  <body class="mini-app">
    <main class="mini-app-panel">
      <p class="eyebrow">Tool</p>
      <h1>로또번호 생성기</h1>
      <div class="number-output" id="numbers" aria-live="polite"></div>
      <button class="primary-button" type="button" id="generate-button">NEW</button>
    </main>
    <script>
      const output = document.querySelector("#numbers");
      const button = document.querySelector("#generate-button");

      function generateNumbers() {
        const pool = Array.from({ length: 45 }, (_, index) => index + 1);
        const picked = [];

        while (picked.length < 6) {
          const index = Math.floor(Math.random() * pool.length);
          picked.push(pool.splice(index, 1)[0]);
        }

        const pickedNumbers = new Set(picked);
        output.innerHTML = Array.from({ length: 45 }, (_, index) => {
          const number = index + 1;
          const className = pickedNumbers.has(number) ? "is-picked" : "";
          return `<span class="${className}">${number}</span>`;
        }).join("");
      }

      button.addEventListener("click", generateNumbers);
      generateNumbers();
    </script>
  </body>
</html>
