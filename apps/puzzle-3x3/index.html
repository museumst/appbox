<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3x3 Sliding Puzzle</title>
    <link rel="stylesheet" href="../../assets/styles.css?v=20260517-mini-title-width" />
  </head>
  <body class="mini-app">
    <main class="mini-app-panel">
      <p class="eyebrow">Game</p>
      <h1>3x3 Sliding Puzzle</h1>
      <div class="tile-grid" id="tile-grid" data-grid-size="3" aria-label="Puzzle board"></div>
      <button class="primary-button" type="button" id="shuffle-button">NEW</button>
    </main>
    <script>
      const grid = document.querySelector("#tile-grid");
      const shuffleButton = document.querySelector("#shuffle-button");
      const gridSize = 3;
      const tileImageVersion = "20260516-tile-09";
      let tiles = [...Array(gridSize * gridSize - 1).keys()].map((index) => index + 1).concat(null);

      function render() {
        grid.innerHTML = tiles
          .map((tile, index) => {
            const label = tile === null ? "빈 칸" : `${tile}번 타일`;
            const className = tile === null ? "empty" : "";
            const content =
              tile === null
                ? ""
                : `<img src="../puzzle/tiles/tile-${String(tile).padStart(2, "0")}.jpeg?v=${tileImageVersion}" alt="" draggable="false" />`;
            return `<button class="${className}" type="button" data-index="${index}" aria-label="${label}">${content}</button>`;
          })
          .join("");
      }

      function canMove(index) {
        const emptyIndex = tiles.indexOf(null);
        const row = Math.floor(index / gridSize);
        const col = index % gridSize;
        const emptyRow = Math.floor(emptyIndex / gridSize);
        const emptyCol = emptyIndex % gridSize;
        return Math.abs(row - emptyRow) + Math.abs(col - emptyCol) === 1;
      }

      function move(index) {
        if (!canMove(index)) return;
        const emptyIndex = tiles.indexOf(null);
        [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
        render();
      }

      function shuffle() {
        for (let i = 0; i < 90; i += 1) {
          const movable = tiles
            .map((tile, index) => (tile === null ? null : index))
            .filter((index) => index !== null && canMove(index));
          move(movable[Math.floor(Math.random() * movable.length)]);
        }
        render();
      }

      grid.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        move(Number(button.dataset.index));
      });

      shuffleButton.addEventListener("click", shuffle);
      shuffle();
    </script>
  </body>
</html>
